name: Deploy to BigRock

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      # Assemble the exact public_html layout: the built site plus the
      # PHP backend bundle. config.php and data/*.db deliberately don't
      # exist here — they live only on the server and are excluded below
      # so a deploy never touches the live admin password or lead data.
      - name: Assemble deploy bundle
        run: |
          mkdir -p deploy
          cp -r dist/. deploy/
          cp -r bigrock/api deploy/
          cp -r bigrock/admin deploy/
          mkdir -p deploy/data
          cp bigrock/.htaccess deploy/.htaccess
          cp bigrock/data/.htaccess deploy/data/.htaccess

      - name: Deploy over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BIGROCK_FTP_SERVER }}
          username: ${{ secrets.BIGROCK_FTP_USERNAME }}
          password: ${{ secrets.BIGROCK_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: ${{ secrets.BIGROCK_FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/api/config.php
            **/data/**
